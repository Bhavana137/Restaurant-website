<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery - Tasty Bites Restaurant</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

/* Background Image */

body{
    min-height:100vh;

    background:
    linear-gradient(
        rgba(0,0,0,0.65),
        rgba(0,0,0,0.65)
    ),
    url("https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?auto=format&fit=crop&w=1600&q=80");

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-attachment:fixed;
}

/* Navbar */

.navbar{
    background:#111;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 60px;
}

.logo{
    color:#f9a825;
    font-size:28px;
    font-weight:bold;
}

.logo span{
    display:block;
    color:white;
    font-size:14px;
}

.nav-links{
    list-style:none;
    display:flex;
}

.nav-links li{
    margin-left:30px;
}

.nav-links a{
    text-decoration:none;
    color:white;
    font-weight:bold;
    transition:0.3s;
}

.nav-links a:hover{
    color:#f9a825;
}

/* Gallery Section */

.gallery{
    width:95%;
    margin:40px auto;
    padding:30px;

    background:rgba(255,255,255,0.10);
    backdrop-filter:blur(8px);

    border-radius:15px;
}

.gallery h1{
    text-align:center;
    color:white;
    font-size:60px;
    margin-bottom:40px;
    text-shadow:2px 2px 10px rgba(0,0,0,0.5);
}

/* 5 Images Per Row */

.gallery-container{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:20px;
}

.gallery-container img{
    width:100%;
    height:220px;
    object-fit:cover;
    border-radius:12px;
    box-shadow:0 4px 15px rgba(0,0,0,0.4);
    transition:0.4s;
}

.gallery-container img:hover{
    transform:scale(1.05);
}

/* Responsive */

@media(max-width:1200px){

.gallery-container{
    grid-template-columns:repeat(4,1fr);
}

}

@media(max-width:900px){

.gallery-container{
    grid-template-columns:repeat(3,1fr);
}

}

@media(max-width:600px){

.gallery-container{
    grid-template-columns:repeat(2,1fr);
}

.navbar{
    flex-direction:column;
    padding:15px;
}

.nav-links{
    flex-wrap:wrap;
    justify-content:center;
    margin-top:10px;
}

.nav-links li{
    margin:8px;
}

.gallery h1{
    font-size:40px;
}

}

</style>
</head>

<body>

<!-- Navbar -->

<nav class="navbar">

<div class="logo">
🍽 Tasty Bites
<span>RESTAURANT</span>
</div>

<ul class="nav-links">
<li><a href="index.html">Home</a></li>
<li><a href="about.html">About</a></li>
<li><a href="menu.html">Menu</a></li>
<li><a href="gallery.html">Gallery</a></li>
<li><a href="offers.html">Offers</a></li>
<li><a href="reservation.html">Reservations</a></li>
<li><a href="contact.html">Contact</a></li>
</ul>

</nav>

<!-- Gallery Section -->

<section class="gallery">

<h1>Our Gallery</h1>

<div class="gallery-container">

<img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?w=600" alt="Pizza">

<img src="https://images.unsplash.com/photo-1552566626-52f8b828add9?w=600" alt="Restaurant">

<img src="https://images.unsplash.com/photo-1473093295043-cdd812d0e601?w=600" alt="Pasta">

<img src="https://images.unsplash.com/photo-1578985545062-69928b1d9587?w=600" alt="Cake">

<img src="https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=600" alt="Dining">

<img src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=600" alt="Pizza">

<img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=600" alt="Food">

<img src="https://images.unsplash.com/photo-1559339352-11d035aa65de?w=600" alt="Dessert">

<img src="https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=600" alt="Restaurant Interior">

<img src="https://images.unsplash.com/photo-1528605248644-14dd04022da1?w=600" alt="Dining Table">

</div>

</section>

</body>
</html>

body{

/* Navbar */
.navbar{
    background:#111;
    display:flex;

}

.logo{
    color:#f9a825;
    font-size:28px;
    font-weight:bold;
}

.logo span{
    color:white;
    font-size:14px;
    display:block;
}

.nav-links{
    list-style:none;
    display:flex;

.nav-links li{

}

.nav-links a{
    text-decoration:none;
    color:white;

.nav-links a:hover{

.hero{

    background-position:center;
    display:flex;
    align-items:center;
    padding-left:80px;
}

.hero-content{
    max-width:500px;
    color:white;
}

.hero-content h3{
    color:#f9a825;
    font-size:32px;
    font-style:italic;
}

.hero-content h1{
    font-size:65px;
    line-height:1.1;
    margin:10px 0;
}

.hero-content h1 span{
    color:#f9a825;
}

.hero-content p{
    font-size:18px;
    line-height:1.6;
    margin:20px 0;
}

.btn{
    display:inline-block;
    background:#f9a825;
    color:white;
    padding:15px 35px;
    text-decoration:none;
    border-radius:4px;
    font-weight:bold;

.btn:hover{

<nav class="navbar">
